name: encargoo
description: Sistema de gestión de pedidos y encargos.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.6

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # Image
  image_picker: ^1.1.1
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  url_launcher: ^6.2.6
  shared_preferences: ^2.3.2

  # UI
  gap: ^3.0.1
  flutter_staggered_animations: ^1.1.1
  font_awesome_flutter: ^10.9.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 500

  assets:
    - assets/fonts/
    - assets/images/
